<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 图片工作流解析器</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── 主题与模式变量系统 ── */
:root {
  --mono: 'JetBrains Mono', 'Consolas', monospace;
  --sans: 'Nunito', 'Segoe UI', sans-serif;
  --radius: 13px;
  
  /* 默认主题：淡绿 */
  --h: 142; --s: 46%; --l: 42%; --c-on-p: #ffffff;
}

/* 主题颜色定义 (Hue, Saturation, Lightness, Primary Text Color) */
[data-theme="green"]  { --h: 142; --s: 46%; --l: 42%; --c-on-p: #ffffff; }
[data-theme="blue"]   { --h: 212; --s: 65%; --l: 48%; --c-on-p: #ffffff; }
[data-theme="purple"] { --h: 265; --s: 55%; --l: 52%; --c-on-p: #ffffff; }
[data-theme="red"]    { --h: 350; --s: 65%; --l: 48%; --c-on-p: #ffffff; }
[data-theme="pink"]   { --h: 330; --s: 70%; --l: 55%; --c-on-p: #ffffff; }
[data-theme="yellow"] { --h: 42;  --s: 90%; --l: 45%; --c-on-p: #111111; }
[data-theme="cyan"]   { --h: 185; --s: 65%; --l: 40%; --c-on-p: #ffffff; }
[data-theme="orange"] { --h: 25;  --s: 85%; --l: 50%; --c-on-p: #ffffff; }

/* 模式定义：白天 (默认) */
:root, [data-mode="day"] {
  --bg: hsl(var(--h), 30%, 96%);
  --surface: #ffffff;
  --surface2: hsl(var(--h), 40%, 94%);
  --primary: hsl(var(--h), var(--s), var(--l));
  --primary-light: hsl(var(--h), var(--s), calc(var(--l) + 13%));
  --primary-dark: hsl(var(--h), var(--s), calc(var(--l) - 13%));
  --accent: var(--primary);
  --text: hsl(var(--h), 30%, 13%);
  --text-muted: hsl(var(--h), 20%, 40%);
  --border: hsl(var(--h), 30%, 82%);
  --border-light: hsl(var(--h), 30%, 90%);
  --shadow: 0 4px 24px hsla(var(--h), 40%, 20%, 0.10);
  --shadow-lg: 0 8px 40px hsla(var(--h), 40%, 20%, 0.16);
  
  --diff-bg: #fff8e1; --diff-border: #f59e0b; --diff-text: #92400e;
  --diff-row: #fffbeb; --diff-row-first: #fef3c7;
  --raw-bg: #0f1e14; --raw-text: #7de0a8;
  --vp-bg: hsl(var(--h), 30%, 94%); --vp-dot: hsla(var(--h), var(--s), var(--l), 0.25);
  
  --nai-bg-1: #fdf4ff; --nai-bg-2: #fce7f3; --nai-border: #e879f9;
  --nai-hd-1: #a21caf; --nai-hd-2: #db2777; --nai-text-bg: #fdf4ff; --nai-text-border: #f0abfc; --nai-text-c: #fff;
  
  --neg-bg: #fff5f6; --neg-border: #fbd5da; --neg-text: #6b1a23;
  --row-hover: hsl(var(--h), 40%, 97%);
  
  --badge-sd-bg: #e3f2fd; --badge-sd-text: #1055b0;
  --badge-cf-bg: #e8f5e9; --badge-cf-text: #1f7e40;
  --badge-nai-bg: #fdf2f8; --badge-nai-text: #86198f;
  --badge-uk-bg: #f3e5f5; --badge-uk-text: #6a1b9a;
  
  --conn-shadow: rgba(0,0,0,0.12);
}

/* 模式定义：黄昏 */
[data-mode="dusk"] {
  --bg: hsl(var(--h), 15%, 16%);
  --surface: hsl(var(--h), 15%, 21%);
  --surface2: hsl(var(--h), 15%, 26%);
  --primary: hsl(var(--h), var(--s), var(--l));
  --primary-light: hsl(var(--h), var(--s), calc(var(--l) + 15%));
  --primary-dark: hsl(var(--h), var(--s), calc(var(--l) - 15%));
  --accent: var(--primary);
  --text: hsl(var(--h), 10%, 90%);
  --text-muted: hsl(var(--h), 10%, 65%);
  --border: hsl(var(--h), 15%, 32%);
  --border-light: hsl(var(--h), 15%, 26%);
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
  
  --diff-bg: hsla(40, 100%, 20%, 0.4); --diff-border: #d97706; --diff-text: #fcd34d;
  --diff-row: hsla(40, 100%, 10%, 0.3); --diff-row-first: hsla(40, 100%, 15%, 0.4);
  --raw-bg: hsl(var(--h), 20%, 10%); --raw-text: hsl(var(--h), 40%, 70%);
  --vp-bg: hsl(var(--h), 15%, 18%); --vp-dot: hsla(var(--h), var(--s), 60%, 0.15);
  
  --nai-bg-1: #2d1b33; --nai-bg-2: #331b28; --nai-border: #9b4dca;
  --nai-hd-1: #5e0e66; --nai-hd-2: #7a1540; --nai-text-bg: #221226; --nai-text-border: #7a329c; --nai-text-c: #fff;
  
  --neg-bg: hsla(350, 40%, 30%, 0.3); --neg-border: hsla(350, 40%, 40%, 0.5); --neg-text: #fca5a5;
  --row-hover: hsla(var(--h), 20%, 25%, 0.4);
  
  --badge-sd-bg: hsla(210, 80%, 40%, 0.2); --badge-sd-text: #60a5fa;
  --badge-cf-bg: hsla(140, 80%, 40%, 0.2); --badge-cf-text: #4ade80;
  --badge-nai-bg: hsla(320, 80%, 40%, 0.2); --badge-nai-text: #f472b6;
  --badge-uk-bg: hsla(280, 80%, 40%, 0.2); --badge-uk-text: #c084fc;
  
  --conn-shadow: rgba(0,0,0,0.5);
}

/* 模式定义：夜间 */
[data-mode="night"] {
  --bg: hsl(var(--h), 10%, 8%);
  --surface: hsl(var(--h), 10%, 12%);
  --surface2: hsl(var(--h), 10%, 16%);
  --primary: hsl(var(--h), var(--s), var(--l));
  --primary-light: hsl(var(--h), var(--s), calc(var(--l) + 15%));
  --primary-dark: hsl(var(--h), var(--s), calc(var(--l) - 15%));
  --accent: var(--primary);
  --text: hsl(var(--h), 10%, 85%);
  --text-muted: hsl(var(--h), 10%, 60%);
  --border: hsl(var(--h), 10%, 20%);
  --border-light: hsl(var(--h), 10%, 15%);
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
  
  --diff-bg: hsla(40, 100%, 20%, 0.3); --diff-border: #b45309; --diff-text: #fde68a;
  --diff-row: hsla(40, 100%, 10%, 0.2); --diff-row-first: hsla(40, 100%, 15%, 0.3);
  --raw-bg: hsl(var(--h), 15%, 5%); --raw-text: hsl(var(--h), 40%, 65%);
  --vp-bg: hsl(var(--h), 10%, 10%); --vp-dot: hsla(var(--h), var(--s), 60%, 0.1);
  
  --nai-bg-1: #2d1b33; --nai-bg-2: #331b28; --nai-border: #9b4dca;
  --nai-hd-1: #5e0e66; --nai-hd-2: #7a1540; --nai-text-bg: #221226; --nai-text-border: #7a329c; --nai-text-c: #fff;
  
  --neg-bg: hsla(350, 40%, 20%, 0.3); --neg-border: hsla(350, 40%, 30%, 0.5); --neg-text: #f87171;
  --row-hover: hsla(var(--h), 20%, 20%, 0.4);
  
  --badge-sd-bg: hsla(210, 80%, 40%, 0.2); --badge-sd-text: #60a5fa;
  --badge-cf-bg: hsla(140, 80%, 40%, 0.2); --badge-cf-text: #4ade80;
  --badge-nai-bg: hsla(320, 80%, 40%, 0.2); --badge-nai-text: #f472b6;
  --badge-uk-bg: hsla(280, 80%, 40%, 0.2); --badge-uk-text: #c084fc;
  
  --conn-shadow: rgba(0,0,0,0.8);
}

/* 模式定义：纯黑 */
[data-mode="black"] {
  --bg: #000000;
  --surface: #080808;
  --surface2: #121212;
  --primary: hsl(var(--h), var(--s), var(--l));
  --primary-light: hsl(var(--h), var(--s), calc(var(--l) + 15%));
  --primary-dark: hsl(var(--h), var(--s), calc(var(--l) - 15%));
  --accent: var(--primary);
  --text: #e0e0e0;
  --text-muted: #888888;
  --border: #222222;
  --border-light: #111111;
  --shadow: none;
  --shadow-lg: none;
  
  --diff-bg: #2a1a00; --diff-border: #92400e; --diff-text: #fef3c7;
  --diff-row: #110a00; --diff-row-first: #1f1400;
  --raw-bg: #000000; --raw-text: hsl(var(--h), 40%, 60%);
  --vp-bg: #030303; --vp-dot: hsla(var(--h), var(--s), 60%, 0.15);
  
  --nai-bg-1: #1a0a1f; --nai-bg-2: #1f0a17; --nai-border: #7e22ce;
  --nai-hd-1: #4a044e; --nai-hd-2: #831843; --nai-text-bg: #120516; --nai-text-border: #6b21a8; --nai-text-c: #fff;
  
  --neg-bg: hsla(350, 40%, 15%, 0.3); --neg-border: hsla(350, 40%, 20%, 0.5); --neg-text: #ef4444;
  --row-hover: hsla(var(--h), 20%, 15%, 0.4);
  
  --badge-sd-bg: hsla(210, 80%, 40%, 0.2); --badge-sd-text: #60a5fa;
  --badge-cf-bg: hsla(140, 80%, 40%, 0.2); --badge-cf-text: #4ade80;
  --badge-nai-bg: hsla(320, 80%, 40%, 0.2); --badge-nai-text: #f472b6;
  --badge-uk-bg: hsla(280, 80%, 40%, 0.2); --badge-uk-text: #c084fc;
  
  --conn-shadow: rgba(255,255,255,0.08);
}

/* 基础样式重置与背景 */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.3s, color 0.3s;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 60%,hsla(var(--h),var(--s),var(--l),.08) 0%,transparent 55%),radial-gradient(ellipse at 85% 15%,hsla(var(--h),var(--s),var(--l),.06) 0%,transparent 55%);pointer-events:none;z-index:0;transition:background 0.3s;}

/* 滚动条美化 */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* HEADER */
.header{position:relative;z-index:10;padding:18px 28px;background:var(--surface);border-bottom:1.5px solid var(--border);box-shadow:0 2px 14px rgba(0,0,0,.03);display:flex;align-items:center;gap:14px;transition:background 0.3s, border-color 0.3s;}
.hicon{width:42px;height:42px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.header h1{font-size:20px;font-weight:800;color:var(--primary-dark)}
.header p{font-size:13px;color:var(--text-muted);margin-top:1px}

/* SETTINGS (主题与模式菜单) */
.settings-wrap { position: relative; margin-left: auto; }
.settings-btn { width: 38px; height: 38px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.settings-btn:hover { background: var(--border-light); color: var(--primary); }
.settings-menu { position: absolute; top: calc(100% + 12px); right: 0; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 18px; width: 260px; display: none; flex-direction: column; z-index: 100; animation: fade-in 0.2s ease-out; }
.settings-menu.on { display: flex; }
@keyframes fade-in { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
.sm-title { font-size: 11.5px; font-weight: 800; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.t-swatch { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 2.5px solid transparent; background: hsl(var(--sh), var(--ss), var(--sl)); cursor: pointer; transition: transform 0.2s, border-color 0.2s; position: relative; }
.t-swatch:hover { transform: scale(1.15); z-index: 2; }
.t-swatch.act { border-color: var(--text); box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--text); z-index: 3; }
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.m-btn { padding: 8px 6px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 700; color: var(--text); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
.m-btn:hover { border-color: var(--primary-light); }
.m-btn.act { background: var(--primary); border-color: var(--primary); color: var(--c-on-p); }

.main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:28px 24px}

/* MODE TOGGLE */
.mode-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.mode-lbl{font-size:13px;font-weight:700;color:var(--text-muted)}
.mode-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:12.5px;font-weight:700;color:var(--text-muted);cursor:pointer;font-family:var(--sans);transition:all .2s}
.mode-btn.act{background:var(--primary);border-color:var(--primary);color:var(--c-on-p)}
.mode-hint{font-size:12px;color:var(--text-muted);margin-left:4px}

/* UPLOAD */
.upload-wrap{position:relative;border:2.5px dashed var(--border);border-radius:var(--radius);background:var(--surface);overflow:hidden;cursor:pointer;transition:all .25s}
.upload-wrap::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,hsla(var(--h),var(--s),var(--l),.06),hsla(var(--h),var(--s),var(--l),.02));opacity:0;transition:opacity .25s}
.upload-wrap:hover,.upload-wrap.over{border-color:var(--primary);box-shadow:var(--shadow)}
.upload-wrap:hover::before,.upload-wrap.over::before{opacity:1}
.upload-inner{padding:52px 24px;text-align:center;pointer-events:none}
.uicon{font-size:54px;display:block;margin-bottom:14px;filter:drop-shadow(0 4px 8px hsla(var(--h),var(--s),var(--l),.25))}
.upload-wrap h2{font-size:19px;font-weight:700;margin-bottom:7px}
.upload-wrap p{color:var(--text-muted);font-size:14px}
.upload-wrap input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* RESULT */
.result{margin-top:24px;display:none}
.result.on{display:block}

/* INFO BAR */
.infobar{display:flex;align-items:center;gap:16px;padding:14px 20px;background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);margin-bottom:20px;box-shadow:var(--shadow)}
.prev-img{width:60px;height:60px;object-fit:cover;border-radius:9px;border:2px solid var(--border);flex-shrink:0}
.imeta{flex:1;min-width:0}
.imeta h3{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.imeta p{font-size:12px;color:var(--text-muted);margin-top:2px}
.badge{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:800;letter-spacing:.4px;flex-shrink:0}
.badge.sd{background:var(--badge-sd-bg);color:var(--badge-sd-text)}
.badge.cf{background:var(--badge-cf-bg);color:var(--badge-cf-text)}
.badge.nai{background:var(--badge-nai-bg);color:var(--badge-nai-text)}
.badge.uk{background:var(--badge-uk-bg);color:var(--badge-uk-text)}
.dl-btn{padding:6px 14px;background:var(--primary);color:var(--c-on-p);border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans);display:flex;align-items:center;gap:5px;flex-shrink:0;transition:background .2s}
.dl-btn:hover{background:var(--primary-dark)}

/* SD WEBUI */
.card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.sec-hd{padding:12px 20px;background:var(--surface2);border-bottom:1.5px solid var(--border);font-weight:700;font-size:13.5px;color:var(--primary-dark);display:flex;align-items:center;gap:8px}
.prompt-box{padding:16px 20px;border-bottom:1px solid var(--border-light)}
.plabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px}
.ptext{font-family:var(--mono);font-size:12.5px;line-height:1.7;background:var(--bg);padding:12px 14px;border-radius:9px;border:1px solid var(--border-light);white-space:pre-wrap;word-break:break-word;position:relative}
.ptext.neg{background:var(--neg-bg);border-color:var(--neg-border);color:var(--neg-text)}
.pcopy{position:absolute;top:8px;right:8px;padding:3px 10px;background:var(--primary);color:var(--c-on-p);border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:background .2s}
.pcopy:hover{background:var(--primary-dark)}

.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.pitem{display:flex;align-items:center;padding:11px 18px;border-bottom:1px solid var(--border-light);border-right:1px solid var(--border-light);gap:10px;transition:background .15s}
.pitem:hover{background:var(--surface2)}
.pkey{font-size:11.5px;font-weight:700;color:var(--text-muted);min-width:95px;flex-shrink:0}
.pval{font-family:var(--mono);font-size:12px;color:var(--text);flex:1;word-break:break-all}
.cbtn{flex-shrink:0;width:26px;height:26px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .18s;color:var(--text-muted)}
.cbtn:hover{background:var(--primary);border-color:var(--primary);color:var(--c-on-p);transform:scale(1.08)}
.cbtn.ok{background:var(--accent);border-color:var(--accent);color:var(--c-on-p)}

/* NAI */
.nai-wrap{background:linear-gradient(135deg,var(--nai-bg-1),var(--nai-bg-2));border-radius:var(--radius);border:1.5px solid var(--nai-border);overflow:hidden;box-shadow:var(--shadow)}
.nai-wrap .sec-hd{background:linear-gradient(135deg,var(--nai-hd-1),var(--nai-hd-2));border-bottom-color:var(--nai-hd-2);color:var(--nai-text-c)}
.nai-wrap .ptext{background:var(--nai-text-bg);border-color:var(--nai-text-border)}
.nai-wrap .ptext.neg{background:var(--neg-bg);border-color:var(--neg-border);color:var(--neg-text)}

/* COMFYUI CANVAS */
.cf-card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.toolbar{padding:9px 16px;background:var(--surface2);border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tlbl{font-size:11.5px;color:var(--text-muted);font-weight:700}
.tbtn{padding:5px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:7px;font-size:12px;font-family:var(--sans);font-weight:700;color:var(--text);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.tbtn:hover{background:var(--primary-light);border-color:var(--primary-light);color:var(--c-on-p)}
.tbtn.act{background:var(--primary);border-color:var(--primary);color:var(--c-on-p)}
.tsep{width:1px;height:20px;background:var(--border)}
.tinfo{margin-left:auto;font-size:11.5px;color:var(--text-muted);font-family:var(--mono)}
.node-count{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;color:var(--primary-dark)}

.viewport{height:620px;overflow:hidden;position:relative;background-color:var(--vp-bg);background-image:radial-gradient(circle,var(--vp-dot) 1.2px,transparent 1.2px);background-size:22px 22px;cursor:grab;user-select:none}
.viewport:active{cursor:grabbing}
.world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
.conn-svg{position:absolute;top:0;left:0;width:8000px;height:8000px;pointer-events:none;overflow:visible}

/* NODES */
.cfnode{position:absolute;min-width:215px;max-width:300px;background:var(--surface);border:2px solid var(--border);border-radius:11px;box-shadow:0 4px 18px rgba(0,0,0,.12);transition:box-shadow .2s,border-color .2s}
.cfnode:hover{box-shadow:0 6px 28px rgba(0,0,0,.2);border-color:var(--primary)}
.cfnode.sel{border-color:var(--primary);box-shadow:0 0 0 3px hsla(var(--h),var(--s),var(--l),.25),0 6px 28px rgba(0,0,0,.2)}
.nhead{padding:9px 13px;border-radius:9px 9px 0 0;cursor:move;display:flex;align-items:center;gap:7px}
.ntitle{font-size:11.5px;font-weight:800;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.2px;pointer-events:none}

<script>
// ─── Global State ─────────────────────────────────────────────────────────────
const CS={scale:1,ox:0,oy:0,panning:false,dragNode:null,nodes:[],links:{},lineStyle:'bezier',vp:null,world:null,svg:null};

// ─── Theme & Mode Logic ───────────────────────────────────────────────────────
function initThemeMode() {
  const sm = document.getElementById('settingsMenu');
  const sb = document.getElementById('settingsBtn');
  
  sb.onclick = (e) => { e.stopPropagation(); sm.classList.toggle('on'); };
  document.addEventListener('click', (e) => {
    if(!sm.contains(e.target) && e.target !== sb) sm.classList.remove('on');
  });

  function apply(theme, mode) {
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.setAttribute('data-mode', mode);
    localStorage.setItem('awp_theme', theme);
    localStorage.setItem('awp_mode', mode);
    
    document.querySelectorAll('.t-swatch').forEach(el => el.classList.toggle('act', el.dataset.theme === theme));
    document.querySelectorAll('.m-btn').forEach(el => el.classList.toggle('act', el.dataset.mode === mode));
    
    // Trigger Canvas redraw if ComfyUI is visible
    if(CS && CS.nodes && CS.nodes.length > 0) { setTimeout(drawConns, 50); }
  }

  document.querySelectorAll('.t-swatch').forEach(btn => {
    btn.onclick = () => apply(btn.dataset.theme, document.documentElement.getAttribute('data-mode') || 'day');
  });
  document.querySelectorAll('.m-btn').forEach(btn => {
    btn.onclick = () => apply(document.documentElement.getAttribute('data-theme') || 'green', btn.dataset.mode);
  });

  // Auto detect or load from localStorage
  let savedT = localStorage.getItem('awp_theme') || 'green';
  let savedM = localStorage.getItem('awp_mode');
  
  if(!savedM) {
    const hr = new Date().getHours();
    if(hr >= 6 && hr < 17) savedM = 'day';
    else if(hr >= 17 && hr < 20) savedM = 'dusk';
    else savedM = 'night';
  }
  apply(savedT, savedM);
}
initThemeMode();

// ─── Utilities ───────────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function showToast(m='✓ 已复制'){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2000)}
function copy(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    showToast();
    if(btn){btn.classList.add('ok');const prev=btn.textContent;btn.textContent='✓';setTimeout(()=>{btn.classList.remove('ok');btn.textContent=prev},1500)}
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();
  })
}
function safeJSON(s){try{return JSON.parse(s)}catch{return null}}
function downloadJSON(obj,filename){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);
  showToast('✓ JSON 已下载');
}

// ─── Mode Management ─────────────────────────────────────────────────────────
let currentMode='single';
let compareQueue=[]; 

function setMode(m){
  currentMode=m;
  document.getElementById('modeSingle').classList.toggle('act',m==='single');
  document.getElementById('modeCompare').classList.toggle('act',m==='compare');
  const fi=document.getElementById('fileInput');
  if(m==='compare'){
    fi.multiple=true;
    document.getElementById('uploadTitle').textContent='拖拽多张图片至此，或点击上传';
    document.getElementById('uploadSub').textContent='上传同类型 AI 图片进行参数对比（最多 6 张）';
    document.getElementById('modeHint').textContent='上传多张同类型图片，高亮显示不同参数';
    if(compareQueue.length) renderComparison();
  } else {
    fi.multiple=false;
    document.getElementById('uploadTitle').textContent='拖拽图片至此，或点击上传';
    document.getElementById('uploadSub').textContent='支持 ComfyUI · SD WebUI · NovelAI 生成的 PNG 图片';
    document.getElementById('modeHint').textContent='上传一张 AI 图片解析元数据';
    compareQueue=[];
  }
}

// ─── PNG Metadata Reader ──────────────────────────────────────────────────────
async function readPNGMeta(file){
  const buf=await file.arrayBuffer();
  const u8=new Uint8Array(buf);
  const SIG=[137,80,78,71,13,10,26,10];
  for(let i=0;i<8;i++) if(u8[i]!==SIG[i]) return null;
  const view=new DataView(buf);
  const dec=new TextDecoder('utf-8');
  const meta={};
  let off=8;
  while(off+12<=u8.length){
    const len=view.getUint32(off);
    if(len<0||len>buf.byteLength) break;
    const type=String.fromCharCode(u8[off+4],u8[off+5],u8[off+6],u8[off+7]);
    if(type==='IEND') break;
    if(type==='tEXt'){
      try{
        const d=u8.slice(off+8,off+8+len);
        const ni=d.indexOf(0);
        if(ni>=0){
          const kw=dec.decode(d.slice(0,ni));
          let val;try{val=dec.decode(d.slice(ni+1))}catch{val=new TextDecoder('latin1').decode(d.slice(ni+1))}
          meta[kw]=val;
        }
      }catch{}
    } else if(type==='iTXt'){
      try{
        const d=u8.slice(off+8,off+8+len);
        let p=0;
        while(p<d.length&&d[p]!==0) p++;
        const kw=dec.decode(d.slice(0,p));p++;
        const cf=d[p++];p++;
        while(p<d.length&&d[p]!==0) p++;p++;
        while(p<d.length&&d[p]!==0) p++;p++;
        const td=d.slice(p);
        let val;
        if(cf===1){
          try{
            const ds=new DecompressionStream('deflate');
            const w=ds.writable.getWriter();w.write(td);w.close();
            const r=ds.readable.getReader();const ch=[];let res;
            while(!(res=await r.read()).done) ch.push(res.value);
            let tot=0;for(const c of ch) tot+=c.length;
            const all=new Uint8Array(tot);let pp=0;
            for(const c of ch){all.set(c,pp);pp+=c.length}
            val=dec.decode(all);
          }catch{val=dec.decode(td)}
        } else {val=dec.decode(td)}
        meta[kw]=val;
      }catch{}
    }
    off+=12+len;
  }
  return meta;
}

// ─── Type Detection ───────────────────────────────────────────────────────────
function detectType(meta){
  if(!meta) return 'unknown';
  if(meta.Software==='NovelAI') return 'novelai';
  if(meta.Description && meta.Comment){
    const c=safeJSON(meta.Comment);
    if(c && (c.uc!==undefined||c.scale!==undefined||c.sampler!==undefined)) return 'novelai';
  }
  if(meta.workflow||(meta.prompt&&!meta.parameters)) return 'comfyui';
  if(meta.parameters) return 'sdwebui';
  return 'unknown';
}

// ─── NovelAI Parser ───────────────────────────────────────────────────────────
function parseNAI(meta){
  const c=safeJSON(meta.Comment)||{};
  const pos=meta.Description||c.prompt||'';
  const neg=c.uc||'';
  const paramMap={
    'steps':'Steps','sampler':'Sampler','seed':'Seed',
    'scale':'CFG Scale','strength':'Strength','noise':'Noise',
    'cfg_rescale':'CFG Rescale','sm':'SMEA','sm_dyn':'SMEA DYN',
    'width':'Width','height':'Height',
    'model':'Model','clip_skip':'Clip Skip',
    'n_samples':'Batch Size','qualityToggle':'Quality Toggle',
    'ucPreset':'UC Preset','dynamic_thresholding':'Dyn Threshold',
    'controlnet_strength':'ControlNet Strength',
    'add_original_image':'Add Original Img',
  };
  const params=[];
  for(const [ck,label] of Object.entries(paramMap)){
    if(c[ck]!==undefined&&c[ck]!==null){
      params.push({k:label,v:String(c[ck])});
    }
  }
  const known=new Set(Object.keys(paramMap).concat(['uc','prompt']));
  for(const [k,v] of Object.entries(c)){
    if(!known.has(k)&&v!==null&&v!==undefined&&typeof v!=='object'){
      params.push({k,v:String(v)});
    }
  }
  if(meta.Source) params.push({k:'Source Hash',v:meta.Source});
  if(meta['Generation time']) params.push({k:'Gen Time',v:meta['Generation time']});
  return {pos,neg,params};
}

// ─── SD WebUI Parser ──────────────────────────────────────────────────────────
function parseSDParams(raw){
  const r={pos:'',neg:'',params:[]};
  const ni=raw.indexOf('\nNegative prompt:');
  let settings='',rest=raw;
  if(ni>=0){
    r.pos=raw.slice(0,ni).trim();
    rest=raw.slice(ni+1);
  } else if(raw.startsWith('Negative prompt:')){
    rest=raw;
  } else {
    const si=raw.search(/\nSteps:/);
    if(si>=0){r.pos=raw.slice(0,si).trim();settings=raw.slice(si+1).trim();rest='';}
    else{r.pos=raw.trim();rest='';}
  }
  if(rest){
    const np=rest.indexOf('Negative prompt:');
    if(np>=0){
      const after=rest.slice(np+'Negative prompt:'.length);
      const si=after.search(/\nSteps:/);
      if(si>=0){r.neg=after.slice(0,si).trim();settings=after.slice(si+1).trim();}
      else r.neg=after.trim();
      if(!r.pos){const pp=rest.slice(0,np).trim();if(pp) r.pos=pp;}
    } else if(!settings){
      const si=rest.search(/\nSteps:/);
      if(si>=0){if(!r.pos) r.pos=rest.slice(0,si).trim();settings=rest.slice(si+1).trim();}
    }
  }
  if(settings){
    const all=settings.replace(/\n/g,', ');
    const parts=all.split(/,\s*(?=[A-Za-z][^:,]*:)/);
    for(const p of parts){
      const ci=p.indexOf(':');
      if(ci>0){const k=p.slice(0,ci).trim();const v=p.slice(ci+1).trim();if(k&&v) r.params.push({k,v});}
    }
  }
  return r;
}

function fromPrompt(pr){

// ─── Flat Params Extractor (for comparison) ───────────────────────────────────
function extractFlatParams(type, parsed, meta){
  const flat={};
  if(type==='sdwebui'||type==='novelai'){
    if(parsed.pos) flat['__pos__']=parsed.pos;
    if(parsed.neg) flat['__neg__']=parsed.neg;
    for(const {k,v} of parsed.params) flat[k]=v;
  } else if(type==='comfyui'){
    for(const n of (parsed.nodes||[])){
      for(const {k,v} of (n.params||[])){
        const fk=`${n.title||n.type}::${k}`;flat[fk]=v;
      }
    }
  } else {
    for(const [k,v] of Object.entries(meta)) flat[k]=v;
  }
  return flat;
}

// ─── Comparison Renderer ─────────────────────────────────────────────────────
function renderComparison(){
  const res=document.getElementById('result');
  const rc=document.getElementById('rc');
  res.classList.add('on');
  rc.innerHTML='';

  if(!compareQueue.length){res.classList.remove('on');return;}

  const types=new Set(compareQueue.map(e=>e.type));
  const mixedWarning=types.size>1?`<div class="error" style="margin-bottom:14px">⚠️ 检测到不同格式图片（${[...types].join(', ')}），对比结果可能不准确。建议上传同类型图片。</div>`:'';

  const allFlat=compareQueue.map(e=>extractFlatParams(e.type,e.parsed,e.meta));
  const keyOrder=[];const keySeen=new Set();
  for(const flat of allFlat){
    for(const k of Object.keys(flat)){if(!keySeen.has(k)){keySeen.add(k);keyOrder.push(k);}}
  }

  const diffKeys=new Set();
  for(const k of keyOrder){
    const vals=allFlat.map(f=>normalizeCmpValue(f[k]));
    const uniq=new Set(vals.map(v=>v===null?'__NULL__':v));
    if(uniq.size>1) diffKeys.add(k);
  }

  const typeLabel={sdwebui:'SD WebUI',comfyui:'ComfyUI',novelai:'NovelAI',unknown:'Unknown'};
  const typeCls={sdwebui:'sd',comfyui:'cf',novelai:'nai',unknown:'uk'};
  const diffRenderMap=buildDiffRenderMap(diffKeys, allFlat);

  const hdr=document.createElement('div');
  hdr.className='cmp-header';
  hdr.innerHTML=`
    <div>
      <h3>⚖️ 多图参数对比</h3>
      <span class="cmp-subtext">${compareQueue.length} 张图片 · <span style="color:var(--diff-border);font-weight:800">${diffKeys.size} 个差异参数</span> · ${keyOrder.length} 个参数总计</span>
    </div>
    <button class="cmp-dl" onclick="downloadAllJSON()">⬇ 下载全部 JSON</button>
    <button class="cmp-clear" onclick="clearCompare()">✕ 清除</button>`;
  rc.appendChild(hdr);

  if(mixedWarning){const w=document.createElement('div');w.innerHTML=mixedWarning;rc.appendChild(w.firstElementChild);}

  const diffKeyList=keyOrder.filter(k=>diffKeys.has(k));
  if(diffKeyList.length){
    appendCompareSection(
      rc,
      '🔎 差异项速览',
      `仅展示 ${diffKeyList.length} 个存在差异的参数`,
      diffKeyList,
      allFlat,
      diffKeys,
      diffRenderMap,
      typeLabel,
      typeCls
    );
  } else {
    const empty=document.createElement('div');
    empty.className='cmp-wrap';
    empty.style.marginBottom='16px';
    empty.innerHTML=`<div class="sec-hd">🔎 差异项速览<span class="cmp-section-note">当前图片参数一致</span></div><div class="cmp-empty-box">未检测到差异项。</div>`;
    rc.appendChild(empty);
  }

  appendCompareSection(
    rc,
    '📋 全部参数',
    `完整展示 ${keyOrder.length} 个参数`,
    keyOrder,
    allFlat,
    diffKeys,
    diffRenderMap,
    typeLabel,
    typeCls
  );

  const mainWrap=rc.lastElementChild;
  if(mainWrap&&compareQueue.length<6){
    const hint=document.createElement('div');hint.className='cmp-add-hint';
    hint.innerHTML=`📎 可继续上传图片加入对比（当前 ${compareQueue.length}/6 张）`;
    mainWrap.appendChild(hint);
  }

  const dlWrap=document.createElement('div');dlWrap.style.cssText='margin-top:16px;display:flex;gap:10px;flex-wrap:wrap';
  for(let i=0;i<compareQueue.length;i++){
    const entry=compareQueue[i];
    const btn=document.createElement('button');
    btn.className='dl-btn';
    btn.innerHTML=`⬇ ${esc(entry.file.name.slice(0,20))} JSON`;
    btn.onclick=()=>downloadJSON(entry.meta, entry.file.name.replace(/\.[^.]+$/,'')+'.json');
    dlWrap.appendChild(btn);
  }
  rc.appendChild(dlWrap);
}

function clearCompare(){
  compareQueue=[];
  const res=document.getElementById('result');
  const rc=document.getElementById('rc');
  res.classList.remove('on');
  rc.innerHTML='';
}

function downloadAllJSON(){
  const obj={};
  for(const entry of compareQueue){
    obj[entry.file.name]=entry.meta;
  }
  downloadJSON(obj,'compare_metadata.json');
}

function normalizeCmpValue(v){
  return v===null||v===undefined?null:String(v);
}

function tokenizeDiffText(value){
  return String(value).match(/(\r\n|\n|\r|\s+|[，,。.;:：!！?？、|\/\\()\[\]{}<>《》【】"'“”‘’`~@#$%^&*+=-]+|[^ \t\r\n，,。.;:：!！?？、|\/\\()\[\]{}<>《》【】"'“”‘’`~@#$%^&*+=-]+)/g)||[String(value)];
}

function lcsSequence(a,b){
  const n=a.length,m=b.length;
  const dp=Array.from({length:n+1},()=>Array(m+1).fill(0));
  for(let i=n-1;i>=0;i--){
    for(let j=m-1;j>=0;j--){
      dp[i][j]=a[i]===b[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);
    }
  }
  const seq=[];
  let i=0,j=0;
  while(i<n&&j<m){
    if(a[i]===b[j]){seq.push(a[i]);i++;j++;}
    else if(dp[i+1][j]>=dp[i][j+1]) i++;
    else j++;
  }
  return seq;
}

function lcsIndexSet(a,b){
  const n=a.length,m=b.length;
  if(!n||!m) return new Set();
  const dp=Array.from({length:n+1},()=>Array(m+1).fill(0));
  for(let i=n-1;i>=0;i--){
    for(let j=m-1;j>=0;j--){
      dp[i][j]=a[i]===b[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);
    }
  }
  const idx=new Set();
  let i=0,j=0;
  while(i<n&&j<m){
    if(a[i]===b[j]){idx.add(j);i++;j++;}
    else if(dp[i+1][j]>=dp[i][j+1]) i++;
    else j++;
  }
  return idx;
}

function buildGroupCommonTokens(values){
  if(values.some(v=>v===null)) return [];
  const tokenGroups=values.filter(v=>v!==null).map(v=>tokenizeDiffText(v));
  if(!tokenGroups.length) return [];
  let common=tokenGroups[0];
  for(let i=1;i<tokenGroups.length;i++){
    common=lcsSequence(common,tokenGroups[i]);
    if(!common.length) break;
  }
  return common;
}

function renderCmpDiffHTML(value, commonTokens){
  const tokens=tokenizeDiffText(value);
  const commonIdx=commonTokens.length?lcsIndexSet(commonTokens,tokens):new Set();
  let html='',buf='',isDiffSeg=null;
  const flush=()=>{
    if(!buf) return;
    html+=isDiffSeg?`<mark class="cmp-diff-part">${buf}</mark>`:buf;
    buf='';
  };
  for(let i=0;i<tokens.length;i++){
    const tokenHTML=esc(tokens[i]);
    const isDiff=!commonTokens.length||!commonIdx.has(i);
    if(isDiffSeg===null) isDiffSeg=isDiff;
    if(isDiff!==isDiffSeg){flush();isDiffSeg=isDiff;}
    buf+=tokenHTML;
  }
  flush();
  return html||esc(value);
}

function buildDiffRenderMap(diffKeys, allFlat){
  const map={};
  for(const k of diffKeys){
    const vals=allFlat.map(f=>normalizeCmpValue(f[k]));
    const commonTokens=buildGroupCommonTokens(vals);
    map[k]={htmls:vals.map(v=>v===null?'':renderCmpDiffHTML(v,commonTokens))};
  }
  return map;
}

function getCompareDisplayKey(k){
  return k==='__pos__'?'正向提示词':k==='__neg__'?'负向提示词':esc(k);
}

function renderCmpValueBlock(rawValue, htmlValue){
  const needsExpand=rawValue.length>160||rawValue.includes('\n');
  return `<div class="cmp-val-wrap${needsExpand?' is-collapsible':''}">
    <div class="cmp-val">${htmlValue}</div>
    ${needsExpand?'<button class="cmp-expand" type="button" onclick="toggleCmpExpand(this)">展开</button>':''}
  </div>`;
}

function renderCompareCell(rawValue, isDiff, diffHTML=''){
  const value=normalizeCmpValue(rawValue);
  const cellCls=isDiff?'diff-cell':'';
  if(value===null){
    return `<td class="${cellCls}"><span class="cmp-empty">${isDiff?'缺失':'—'}</span></td>`;
  }
  const htmlValue=isDiff&&diffHTML?diffHTML:esc(value);
  return `<td class="${cellCls}">${renderCmpValueBlock(value,htmlValue)}</td>`;
}

function buildCompareTableHTML(keys, allFlat, diffKeys, diffRenderMap, typeLabel, typeCls){
  let th=`<div class="cmp-scroll"><table class="cmp-table"><thead><tr><th><div class="cmp-th-inner"><span style="font-size:11px;color:var(--text-muted)">参数</span></div></th>`;
  for(const entry of compareQueue){
    th+=`<th><div class="cmp-th-inner">
      <img src="${entry.imgURL}" class="cmp-thumb" alt="">
      <span class="cmp-fname" title="${esc(entry.file.name)}">${esc(entry.file.name)}</span>
      <span class="cmp-ftype ${typeCls[entry.type]||'uk'}">${typeLabel[entry.type]||'Unknown'}</span>
    </div></th>`;
  }
  th+=`</tr></thead><tbody>`;

  let rows='';
  for(const k of keys){
    const vals=allFlat.map(f=>f[k]??null);
    const isDiff=diffKeys.has(k);
    const renderInfo=diffRenderMap[k];
    rows+=`<tr class="${isDiff?'diff-row':''}">`;
    rows+=`<td>${getCompareDisplayKey(k)}${isDiff?'<span class="diff-badge">差异</span>':''}</td>`;
    for(let i=0;i<compareQueue.length;i++){
      rows+=renderCompareCell(vals[i], isDiff, renderInfo?renderInfo.htmls[i]:'');
    }
    rows+=`</tr>`;
  }
  rows+=`</tbody></table></div>`;
  return th+rows;
}

function appendCompareSection(container, title, note, keys, allFlat, diffKeys, diffRenderMap, typeLabel, typeCls){
  const section=document.createElement('div');
  section.className='cmp-wrap';
  section.style.marginBottom='16px';
  section.innerHTML=`<div class="sec-hd">${title}<span class="cmp-section-note">${note}</span></div>${buildCompareTableHTML(keys, allFlat, diffKeys, diffRenderMap, typeLabel, typeCls)}`;
  container.appendChild(section);
}

function toggleCmpExpand(btn){
  const wrap=btn.closest('.cmp-val-wrap');
  if(!wrap) return;
  wrap.classList.toggle('expanded');
  btn.textContent=wrap.classList.contains('expanded')?'收起':'展开';
}

// ─── Main Handler ─────────────────────────────────────────────────────────────
async function handleFile(file){
  const res=document.getElementById('result');
  const rc=document.getElementById('rc');

  if(currentMode==='compare'){
    if(compareQueue.length>=6){showToast('⚠️ 最多支持 6 张图片对比');return;}
    const meta=await readPNGMeta(file);
    if(!meta){showToast('⚠️ 无法读取元数据');return;}
    const type=detectType(meta);
    let parsed=null;
    if(type==='sdwebui') parsed=parseSDParams(meta.parameters);
    else if(type==='novelai') parsed=parseNAI(meta);
    else if(type==='comfyui') parsed=parseComfyWorkflow(meta.workflow,meta.prompt)||{nodes:[],links:{}};
    else parsed={params:[]};
    const imgURL=URL.createObjectURL(file);
    compareQueue.push({file,meta,type,parsed,imgURL});
    renderComparison();
    return;
  }

  res.classList.add('on');
  rc.innerHTML=`<div class="loading"><div class="spin"></div> 正在读取图片元数据...</div>`;
  try{
    const meta=await readPNGMeta(file);
    if(!meta){rc.innerHTML=`<div class="error">⚠️ 无法读取元数据，请上传 PNG 格式的 AI 生成图片。</div>`;return;}
    const keys=Object.keys(meta);
    if(!keys.length){rc.innerHTML=`<div class="error">⚠️ 图片中未发现 AI 元数据，可能已被清除或不是 AI 生成图片。</div>`;return;}

    const type=detectType(meta);
    const imgURL=URL.createObjectURL(file);
    const typeLabel={sdwebui:'SD WebUI',comfyui:'ComfyUI',novelai:'NovelAI',unknown:'未知格式'};
    const typeCls={sdwebui:'sd',comfyui:'cf',novelai:'nai',unknown:'uk'};

    const bar=document.createElement('div');bar.className='infobar';
    bar.innerHTML=`<img src="${imgURL}" class="prev-img" alt=""><div class="imeta"><h3>${esc(file.name)}</h3><p>${(file.size/1024).toFixed(1)} KB · PNG · ${typeLabel[type]||'Unknown'}</p></div><span class="badge ${typeCls[type]||'uk'}">${typeLabel[type]||'Unknown'}</span><button class="dl-btn" onclick='downloadJSON(${JSON.stringify(meta)}, ${JSON.stringify(file.name.replace(/\.[^.]+$/,"")+".json")})'>⬇ 下载 JSON</button>`;

    const main=document.createElement('div');
    rc.innerHTML='';rc.appendChild(bar);rc.appendChild(main);

    if(type==='sdwebui'){
      renderSD(parseSDParams(meta.parameters),main);
    } else if(type==='novelai'){
      renderNAI(parseNAI(meta),main);
    } else if(type==='comfyui'){
      const parsed=parseComfyWorkflow(meta.workflow,meta.prompt);
      if(parsed&&parsed.nodes.length) renderCF(parsed,main);
      else main.innerHTML=`<div class="error">⚠️ ComfyUI 工作流数据解析失败，格式可能不受支持。</div>`;
    } else {
      let h=`<div class="card"><div class="sec-hd">🔍 发现的元数据字段 (${keys.length})</div><div class="pgrid">`;
      for(const [k,v] of Object.entries(meta)){h+=`<div class="pitem"><span class="pkey">${esc(k)}</span><span class="pval">${esc(String(v).slice(0,80))}</span><button class="cbtn" onclick="copy(${JSON.stringify(v)},this)">⎘</button></div>`;}
      h+=`</div></div>`;main.innerHTML=h;
    }

    const raw=document.createElement('div');raw.className='raw-wrap';
    raw.innerHTML=`<button class="raw-tog" onclick="this.nextElementSibling.classList.toggle('on');this.querySelector('span').textContent=this.nextElementSibling.classList.contains('on')?'▼':'▶'"><span>▶</span> 查看原始元数据 JSON</button><div class="raw-body">${esc(JSON.stringify(meta,null,2))}</div>`;
    rc.appendChild(raw);
  } catch(err){
    rc.innerHTML=`<div class="error">⚠️ 解析出错: ${esc(err.message)}</div>`;
    console.error(err);
  }
}

// ─── Event Setup ─────────────────────────────────────────────────────────────
const wrap=document.getElementById('uploadWrap');
const fi=document.getElementById('fileInput');
fi.addEventListener('change',e=>{
  const files=Array.from(e.target.files||[]);
  for(const f of files) handleFile(f);
  fi.value='';
});
wrap.addEventListener('dragover',e=>{e.preventDefault();wrap.classList.add('over');});
wrap.addEventListener('dragleave',()=>wrap.classList.remove('over'));
wrap.addEventListener('drop',e=>{
  e.preventDefault();wrap.classList.remove('over');
  const files=Array.from(e.dataTransfer.files||[]);
  for(const f of files) handleFile(f);
});
</script>
